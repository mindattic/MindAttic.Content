          repository: mindattic/MindAttic.Psst
          path: mindattic-psst
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}

      - name: Run sync-mindattic-psst.ps1
        shell: pwsh
        run: |
          ./content/sync/sync-mindattic-psst.ps1 `
            -ContentRoot "$PWD/content" `
